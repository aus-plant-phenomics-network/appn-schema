// Open node.url in a new tab when a node is clicked
network.on("doubleClick", function (params) {
  if (params.nodes && params.nodes.length > 0) {
    var nodeId = params.nodes[0];
    try {
      var node = nodes.get(nodeId);
      if (node && node.url) {
        window.open(node.url, "_blank", "noopener,noreferrer");
      }
    } catch (e) {
      console.error("Could not open node URL:", e);
    }
  }
});

              function drawGraph() {

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/ControlledVariable", "label": "appn:ControlledVariable", "shape": "dot", "title": "appn:ControlledVariable\n        https://schema.plantphenomics.org.au/ControlledVariable\n          A Variable (representation of a Trait using a defined Scale) controlled or modified for an ObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_ControlledVariable.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/GrowthFacilityType", "label": "appn:GrowthFacilityType", "shape": "dot", "title": "appn:GrowthFacilityType\n        https://schema.plantphenomics.org.au/GrowthFacilityType\n          A term from an enumeration of types of GrowthFacility.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_GrowthFacilityType.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/SoftwareApplication", "label": "appn:SoftwareApplication", "shape": "dot", "title": "appn:SoftwareApplication\n        https://schema.plantphenomics.org.au/SoftwareApplication\n          A piece of software that may be perform an Assay.\nNote that SOSA maps software components to prov:Agent, but CDIF recommendation is that Agent should be an intentional role.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_SoftwareApplication.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Scale", "label": "appn:Scale", "shape": "dot", "title": "appn:Scale\n        https://schema.plantphenomics.org.au/Scale\n          A system of units or representation format for values associated with a Variable.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Scale.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Substance", "label": "appn:Substance", "shape": "dot", "title": "appn:Substance\n        https://schema.plantphenomics.org.au/Substance\n          A biological or chemical entity used in a Treatment assay or referenced in a SubstanceQuantity.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Substance.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Sensor", "label": "appn:Sensor", "shape": "dot", "title": "appn:Sensor\n        https://schema.plantphenomics.org.au/Sensor\n          An electromechanical device that can return the value for an ObservedVariable and that may be mounted on a Platform.\nNote that SOSA maps electromechanical components to prov:Agent, but CDIF recommendation is that Agent should be an intentional role.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Sensor.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/XYZLocation", "label": "appn:XYZLocation", "shape": "dot", "title": "appn:XYZLocation\n        https://schema.plantphenomics.org.au/XYZLocation\n          A location defined using an appropriate local spatial geometry in three dimensions.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_XYZLocation.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Trait", "label": "appn:Trait", "shape": "dot", "title": "appn:Trait\n        https://schema.plantphenomics.org.au/Trait\n          A concept represented by a Variable associated with an ObservationUnit.\nIn the DDI-CDI Variable Cascade, a Trait is a Concept or ConceptualVariable.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Trait.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Controller", "label": "appn:Controller", "shape": "dot", "title": "appn:Controller\n        https://schema.plantphenomics.org.au/Controller\n          The entity responsible for performing an Control action and delivering a value for a ControlledVariable.\nThe Controller may be a Person, an Actuator, a SoftwareApplication or an ExternalEvent.\nNote that SOSA maps sosa:Actuator to prov:Agent, but CDIF recommendation is that Agent should be an intentional role.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Controller.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/ExternalEvent", "label": "appn:ExternalEvent", "shape": "dot", "title": "appn:ExternalEvent\n        https://schema.plantphenomics.org.au/ExternalEvent\n          A default entity to represent any trigger outside the control of the experimenters that may affect the state of the experiment and alter a Variable of interest, e.g. severe weather events or equipment failures.\nWhere possible, the resulting state of the experiment should be quantified and the ExternalEvent modeled as the Controller for a Control event.\nWhere quantification is impossible, the ExternalEvent should be modeled as the Controller for a Treatment event.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_ExternalEvent.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/ObservedVariable", "label": "appn:ObservedVariable", "shape": "dot", "title": "appn:ObservedVariable\n        https://schema.plantphenomics.org.au/ObservedVariable\n          A Variable (representation of a Trait using a defined Scale) observed or measured for an ObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_ObservedVariable.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Variable", "label": "appn:Variable", "shape": "dot", "title": "appn:Variable\n        https://schema.plantphenomics.org.au/Variable\n          Representation of a Trait using a defined Scale.\nIn the DDI-CDI Variable Cascade, a Variable is a RepresentedVariable or an InstanceVariable.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Variable.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/SubstanceQuantity", "label": "appn:SubstanceQuantity", "shape": "dot", "title": "appn:SubstanceQuantity\n        https://schema.plantphenomics.org.au/SubstanceQuantity\n          A Variable (representation of a quantity using a defined Scale) for a Substance applied to an ObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_SubstanceQuantity.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Deployment", "label": "appn:Deployment", "shape": "dot", "title": "appn:Deployment\n        https://schema.plantphenomics.org.au/Deployment\n          A transient or long-term association between a Sensor or Actuator and a Platform on which it is mounted.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Deployment.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Person", "label": "appn:Person", "shape": "dot", "title": "appn:Person\n        https://schema.plantphenomics.org.au/Person\n          A Person, preferably identified using an ORCID, that may perform an Assay.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Person.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Platform", "label": "appn:Platform", "shape": "dot", "title": "appn:Platform\n        https://schema.plantphenomics.org.au/Platform\n          A vehicle, building, person or other entity that may carry or include Sensors or Actuators.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Platform.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/BiologicalUnit", "label": "appn:BiologicalUnit", "shape": "dot", "title": "appn:BiologicalUnit\n        https://schema.plantphenomics.org.au/BiologicalUnit\n          A plant or set of plants sharing the same BiologicalMaterial (e.g. a plot or crop in a field) or any Sample of a plant (e.g. an individual organ or leaf clipping) or set of plants (e.g. a cut from a plot) that is treated as an ObservationUnit for collecting or reporting data.\nBiologicalUnits may be part of larger BiologicalUnits.\nFor example a plant (BiologicalUnit) may be part of a cohort (BiologicalUnit) sharing the same BiologicalMaterial and Treatments.\nWhere relevant, the position of a BiologicalUnit within a larger BiologicalUnit or within a GrowthFacility can be specified using a Location.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_BiologicalUnit.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/ResearchActivity", "label": "appn:ResearchActivity", "shape": "dot", "title": "appn:ResearchActivity\n        https://schema.plantphenomics.org.au/ResearchActivity\n          A time-delimited activity contributing to a research goal.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_ResearchActivity.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/ObservationUnit", "label": "appn:ObservationUnit", "shape": "dot", "title": "appn:ObservationUnit\n        https://schema.plantphenomics.org.au/ObservationUnit\n          An entity for which a Study collects data or controls the environment and other parameters.\nObservationUnits may be BiologicalUnits or GrowthFacilities.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_ObservationUnit.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/BiologicalMaterial", "label": "appn:BiologicalMaterial", "shape": "dot", "title": "appn:BiologicalMaterial\n        https://schema.plantphenomics.org.au/BiologicalMaterial\n          A taxonomic and/or genetic profile for one or more BiologicalUnits.\nWhere possible, this should include the material source for the BiologicalMaterial.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_BiologicalMaterial.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Control", "label": "appn:Control", "shape": "dot", "title": "appn:Control\n        https://schema.plantphenomics.org.au/Control\n          An Assay that modifies a property of an ObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Control.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Actuator", "label": "appn:Actuator", "shape": "dot", "title": "appn:Actuator\n        https://schema.plantphenomics.org.au/Actuator\n          An electromechanical device that can control the value for a ControlledVariable and that may be mounted on a Platform.\nNote that SOSA maps electromechanical components to prov:Agent, but CDIF recommendation is that Agent should be an intentional role.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Actuator.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Method", "label": "appn:Method", "shape": "dot", "title": "appn:Method\n        https://schema.plantphenomics.org.au/Method\n          A method or process for performing an Assay.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Method.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Study", "label": "appn:Study", "shape": "dot", "title": "appn:Study\n        https://schema.plantphenomics.org.au/Study\n          A research activity including one or more Assays that record data on a set of ObservationUnits.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Study.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/SpatialLocation", "label": "appn:SpatialLocation", "shape": "dot", "title": "appn:SpatialLocation\n        https://schema.plantphenomics.org.au/SpatialLocation\n          A location defined with geospatial coordinates.\nThe definition of the location should include a schema:geo property with coordinates or a shape.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_SpatialLocation.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Observer", "label": "appn:Observer", "shape": "dot", "title": "appn:Observer\n        https://schema.plantphenomics.org.au/Observer\n          The entity responsible for performing an Observation and delivering a value for an ObservedVariable.\nThe Observer may be a Person, a Sensor or a SoftwareApplication.\nNote that SOSA maps sosa:Sensor to prov:Agent, but CDIF recommendation is that Agent should be an intentional role.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Observer.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Assay", "label": "appn:Assay", "shape": "dot", "title": "appn:Assay\n        https://schema.plantphenomics.org.au/Assay\n          A research action that observes or modifies a set of ObservationUnits.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Assay.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Investigation", "label": "appn:Investigation", "shape": "dot", "title": "appn:Investigation\n        https://schema.plantphenomics.org.au/Investigation\n          A research programme including one or more Studies.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Investigation.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Sampling", "label": "appn:Sampling", "shape": "dot", "title": "appn:Sampling\n        https://schema.plantphenomics.org.au/Sampling\n          An Assay that derives a new representative ObservationUnit from an existing ObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Sampling.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Sample", "label": "appn:Sample", "shape": "dot", "title": "appn:Sample\n        https://schema.plantphenomics.org.au/Sample\n          A BiologicalUnit that has been created from an existing BiologicalUnit through a Sampling assay.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Sample.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/BiologicalUnitType", "label": "appn:BiologicalUnitType", "shape": "dot", "title": "appn:BiologicalUnitType\n        https://schema.plantphenomics.org.au/BiologicalUnitType\n          A term from an enumeration of types of BiologicalUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_BiologicalUnitType.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Treatment", "label": "appn:Treatment", "shape": "dot", "title": "appn:Treatment\n        https://schema.plantphenomics.org.au/Treatment\n          An Assay that adds a Substance or a SubstanceQuantity to an ObservationUnit (includes potting, fertigation, pesticide application, addition of beneficials, etc.).\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Treatment.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/GrowthFacility", "label": "appn:GrowthFacility", "shape": "dot", "title": "appn:GrowthFacility\n        https://schema.plantphenomics.org.au/GrowthFacility\n          A building, enclosed space, field unit, container or other entity in which plants are grown.\nGrowthFacilities may be nested inside other GrowthFacilities, e.g. rhizoboxes inside a growth chamber, to any depth.\nGrowthFacilities include all non-biological ObservationUnits and may be defined for each spatial context at which environmental observations are collected or management actions (Treatments) are performed for one or more BiologicalUnits.\nWhere relevant, the position of a GrowthFacility within a larger GrowthFacility can be specified using a Location.\nGrowthFacilities may be Platforms for Sensors and Actuators.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_GrowthFacility.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Location", "label": "appn:Location", "shape": "dot", "title": "appn:Location\n        https://schema.plantphenomics.org.au/Location\n          A position associated with the placement of a GrowthFacility within another GrowthFacility or of a BiologicalUnit within another BiologicalUnit or GrowthFacility.\nPosition may be expressed as absolute geospatial coordinates (SpatialLocation) or using a locally appropriate organisation into rows and columns and optionally levels (XYZLocation).\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Location.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Sampler", "label": "appn:Sampler", "shape": "dot", "title": "appn:Sampler\n        https://schema.plantphenomics.org.au/Sampler\n          The entity responsible for performing a Sampling and delivering a Sample.\nThe Observer will normally be a Person, although in some contexts some kind of device could be involved.\nNote that SOSA maps sosa:Sampler to prov:Agent, but CDIF recommendation is that Agent should be an intentional role.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Sampler.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/Observation", "label": "appn:Observation", "shape": "dot", "title": "appn:Observation\n        https://schema.plantphenomics.org.au/Observation\n          An Assay that observes or measures properties of an ObservationUnit returning results as property values or images.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_Observation.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/MaterialSource", "label": "appn:MaterialSource", "shape": "dot", "title": "appn:MaterialSource\n        https://schema.plantphenomics.org.au/MaterialSource\n          The source for the BiologicalMaterial.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_MaterialSource.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/derivesFrom", "label": "appn:derivesFrom", "shape": "diamond", "title": "appn:derivesFrom\n        https://schema.plantphenomics.org.au/derivesFrom\n          Identifies the BiologicalUnit from which a Sample was sampled.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_derivesFrom.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasBiologicalUnitType", "label": "appn:hasBiologicalUnitType", "shape": "diamond", "title": "appn:hasBiologicalUnitType\n        https://schema.plantphenomics.org.au/hasBiologicalUnitType\n          Links a BiologicalUnit to its type.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasBiologicalUnitType.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/row", "label": "appn:row", "shape": "diamond", "title": "appn:row\n        https://schema.plantphenomics.org.au/row\n          Specifies the row for an XYZLocation.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_row.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasTrait", "label": "appn:hasTrait", "shape": "diamond", "title": "appn:hasTrait\n        https://schema.plantphenomics.org.au/hasTrait\n          Identifies the Trait associated with a Variable.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasTrait.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasScale", "label": "appn:hasScale", "shape": "diamond", "title": "appn:hasScale\n        https://schema.plantphenomics.org.au/hasScale\n          Identifies the Scale associated with a Variable.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasScale.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/isForObservationUnit", "label": "appn:isForObservationUnit", "shape": "diamond", "title": "appn:isForObservationUnit\n        https://schema.plantphenomics.org.au/isForObservationUnit\n          Relates an Assay to an ObservationUnit for which it is carried out.\nNote that when the Assay is an Observation, the model should infer a schema:observationAbout property from isForObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_isForObservationUnit.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/isLocationWithin", "label": "appn:isLocationWithin", "shape": "diamond", "title": "appn:isLocationWithin\n        https://schema.plantphenomics.org.au/isLocationWithin\n          Specifies that a location is a position within an ObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_isLocationWithin.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/inheritsContext", "label": "appn:inheritsContext", "shape": "diamond", "title": "appn:inheritsContext\n        https://schema.plantphenomics.org.au/inheritsContext\n          Indicates an ObservationUnit should be considered to inherit values for Variables from another ObservationUnit.\nExamples include a plant inheriting environmental variables from a pot, growth cabinet or field or a leaf inheriting environmental and developmental properties from a plant.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_inheritsContext.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/isOfSubstance", "label": "appn:isOfSubstance", "shape": "diamond", "title": "appn:isOfSubstance\n        https://schema.plantphenomics.org.au/isOfSubstance\n          Identifies the Substance associated with a SubstanceQuantity.\nThis represents the biological or chemical substance applied to the ObservationUnit by a Treatment.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_isOfSubstance.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/madeByController", "label": "appn:madeByController", "shape": "diamond", "title": "appn:madeByController\n        https://schema.plantphenomics.org.au/madeByController\n          Identifies the entity (Controller, i.e. one of a Person, Actuator, SoftwareApplication or ExternalEvent) responsible for carrying out a Control or Treatment.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_madeByController.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/level", "label": "appn:level", "shape": "diamond", "title": "appn:level\n        https://schema.plantphenomics.org.au/level\n          Specifies the level for an XYZLocation in a three-dimensional configuration.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_level.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasLocation", "label": "appn:hasLocation", "shape": "diamond", "title": "appn:hasLocation\n        https://schema.plantphenomics.org.au/hasLocation\n          Specifies the location for an ObservationUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasLocation.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasMaterialSource", "label": "appn:hasMaterialSource", "shape": "diamond", "title": "appn:hasMaterialSource\n        https://schema.plantphenomics.org.au/hasMaterialSource\n          Identifies the MaterialSource for BiologicalMaterial.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasMaterialSource.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/usesData", "label": "appn:usesData", "shape": "diamond", "title": "appn:usesData\n        https://schema.plantphenomics.org.au/usesData\n          Identifies a data input to an Observation assay.\nThis is intended for use in relation to Observations delivered using a SoftwareApplication.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_usesData.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasResult", "label": "appn:hasResult", "shape": "diamond", "title": "appn:hasResult\n        https://schema.plantphenomics.org.au/hasResult\n          Identifies a data output from an Observation or Control assay.\nIndividual values are represented by sosa:hasSimpleResult.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasResult.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/forBiologicalMaterial", "label": "appn:forBiologicalMaterial", "shape": "diamond", "title": "appn:forBiologicalMaterial\n        https://schema.plantphenomics.org.au/forBiologicalMaterial\n          Links a Variable to the BiologicalMaterial (i.e. crop) to which it relates.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_forBiologicalMaterial.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/controls", "label": "appn:controls", "shape": "diamond", "title": "appn:controls\n        https://schema.plantphenomics.org.au/controls\n          Identifies a ControlledVariable controlled by a Control assay.\nThe Control adjusts the state of the ControlledVariable to the value specified in any hasResult or hasSimpleResult property.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_controls.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasBiologicalMaterial", "label": "appn:hasBiologicalMaterial", "shape": "diamond", "title": "appn:hasBiologicalMaterial\n        https://schema.plantphenomics.org.au/hasBiologicalMaterial\n          Identifies the BiologicalMaterial for a BiologicalUnit.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasBiologicalMaterial.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasComponent", "label": "appn:hasComponent", "shape": "diamond", "title": "appn:hasComponent\n        https://schema.plantphenomics.org.au/hasComponent\n          Identifies a Substance or SubstanceQuantity included in the current Substance.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasComponent.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/hasDefaultValue", "label": "appn:hasDefaultValue", "shape": "diamond", "title": "appn:hasDefaultValue\n        https://schema.plantphenomics.org.au/hasDefaultValue\n          Specifies the default value for a variable.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_hasDefaultValue.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/madeBySampler", "label": "appn:madeBySampler", "shape": "diamond", "title": "appn:madeBySampler\n        https://schema.plantphenomics.org.au/madeBySampler\n          Identifies the entity (Sampler, i.e. a Person - no other subclasses defined yet) responsible for carrying out an Sampling.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_madeBySampler.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/observes", "label": "appn:observes", "shape": "diamond", "title": "appn:observes\n        https://schema.plantphenomics.org.au/observes\n          Identifies an ObservedVariable controlled by an Observation assay.\nThe Observation records or estimates the state of the ObservationVariable recorded as a value specified in a hasResult or hasSimpleResult property.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_observes.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/madeByObserver", "label": "appn:madeByObserver", "shape": "diamond", "title": "appn:madeByObserver\n        https://schema.plantphenomics.org.au/madeByObserver\n          Identifies the entity (Observer, i.e. one of a Person, Sensor or SoftwareApplication) responsible for carrying out an Observation.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_madeByObserver.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/producesSample", "label": "appn:producesSample", "shape": "diamond", "title": "appn:producesSample\n        https://schema.plantphenomics.org.au/producesSample\n          Identifies the Sample produced by a Sampling assay.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_producesSample.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/deployedOnPlatform", "label": "appn:deployedOnPlatform", "shape": "diamond", "title": "appn:deployedOnPlatform\n        https://schema.plantphenomics.org.au/deployedOnPlatform\n          Identifies a Platform on which Sensors or Actuators are deployed.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_deployedOnPlatform.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/deployedSystem", "label": "appn:deployedSystem", "shape": "diamond", "title": "appn:deployedSystem\n        https://schema.plantphenomics.org.au/deployedSystem\n          Identifies a Sensor or Actuator deployed on a Platform.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_deployedSystem.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/isPartOf", "label": "appn:isPartOf", "shape": "diamond", "title": "appn:isPartOf\n        https://schema.plantphenomics.org.au/isPartOf\n          Relates an Assay to the Study that includes it or a Study to an Investigation.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_isPartOf.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/amount", "label": "appn:amount", "shape": "diamond", "title": "appn:amount\n        https://schema.plantphenomics.org.au/amount\n          Identifies the amount of a Substance associated with a SubstanceQuantity according to the associated Scale.\n        ", "url": "https://github.com/aus-plant-phenomics-network/appn-schema/blob/main/doc/appn_amount.md"}, {"color": "#5E81AC", "font": {"face": "Inter", "size": 18}, "id": "https://schema.plantphenomics.org.au/usedMethod", "label": "appn:usedMethod", "shape": "diamond", "title": "appn:usedMethod\n        https:/
