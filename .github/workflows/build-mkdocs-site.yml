name: Deploy MkDocs to Pages

on:
  workflow_dispatch:
    inputs:
      # environment: 
        # type: environment
        # required: true
      dry_run:
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install -r requirements.txt
      
      - name: Copy png to site/images
        run: |
          mkdir -p site/docs
          cp -f ttl_uml/*.png docs/images/

      - run: mkdocs build
      
      - name: Move HTML to docs as index.html
        run: |
          mkdir -p site/viz
          cp -f script-ghp/appn-schema-pyviz.html site/viz/index.html
          

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
